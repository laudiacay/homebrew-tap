name: Update Homebrew Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.53)'
        required: true

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Wait for PyPI
        run: |
          echo "Waiting for PyPI to have version ${{ steps.version.outputs.version }}..."
          for i in {1..30}; do
            if curl -s "https://pypi.org/pypi/fwts/${{ steps.version.outputs.version }}/json" | grep -q '"version"'; then
              echo "Package found on PyPI"
              exit 0
            fi
            echo "Attempt $i: Package not yet available, waiting..."
            sleep 10
          done
          echo "Package not found on PyPI after 5 minutes"
          exit 1

      - name: Get package info
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://files.pythonhosted.org/packages/source/f/fwts/fwts-${VERSION}.tar.gz"
          curl -sL "$URL" -o package.tar.gz
          SHA256=$(sha256sum package.tar.gz | cut -d' ' -f1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > Formula/fwts.rb << FORMULA
          class Fwts < Formula
            include Language::Python::Virtualenv

            desc "Git worktree workflow manager for feature development"
            homepage "https://github.com/laudiacay/fwts"
            url "${{ steps.package.outputs.url }}"
            sha256 "${{ steps.package.outputs.sha256 }}"
            license "MIT"

            depends_on "python@3.11"

            def install
              system Formula["python@3.11"].opt_bin/"python3.11", "-m", "venv", libexec
            end

            def post_install
              system libexec/"bin/pip", "install", "--upgrade", "fwts==#{version}"
              bin.install_symlink libexec/"bin/fwts"
              bin.install_symlink libexec/"bin/fb"
            end

            test do
              system bin/"fwts", "--help"
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/fwts.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "fwts ${{ steps.version.outputs.version }}"
          git push
